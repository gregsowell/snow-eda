---
- name: Deploy VMware infrastructure using Terraform from EDA
  hosts: localhost
  gather_facts: no
  vars:
    terraform_search_root: "{{ playbook_dir | dirname }}"
    terraform_tfvars_patterns:
      - "terraform.tfvars"
      - "variables.tfvars"

    # test data
    catalog_item: GregSowell VMWare VM Terraform AAP
    cpus: '4'
    dc_name: MNS
    default_gateway: 10.0.50.1
    event: SERVICE_CATALOG
    hd_size: '40'
    ip_address: 10.0.50.24
    os_type: Rocky9
    ram_size: '4096'
    request_name: 551ea43087a7721064a055383cbb3585
    requester: gsowell@redhat.com
    subnet_mask: 255.255.255.0
    vm_folder: /Greg/redhat/terraform
    vm_name: NewVM1

  tasks:
    - name: Find terraform variable files in project
      find:
        paths: "{{ terraform_search_root }}"
        recurse: true
        file_type: file
        patterns: "{{ terraform_tfvars_patterns }}"
      register: terraform_tfvars_find

    - name: Resolve terraform.tfvars path
      set_fact:
        terraform_variables_file: >-
          {{
            (terraform_tfvars_find.files
            | map(attribute='path')
            | select('match', '.*/vmware-terraform/terraform\\.tfvars$')
            | list
            | first)
            | default(
                (terraform_tfvars_find.files
                | map(attribute='path')
                | select('match', '.*/terraform\\.tfvars$')
                | list
                | first),
                true
              )
            | default(
                (terraform_tfvars_find.files
                | map(attribute='path')
                | select('match', '.*/variables\\.tfvars$')
                | list
                | first),
                true
              )
            | default('')
          }}

    - name: Fail if terraform.tfvars was not found
      fail:
        msg: "terraform tfvars file was not found under {{ terraform_search_root }}. Found files: {{ terraform_tfvars_find.files | map(attribute='path') | list | join(', ') }}"
      when: terraform_variables_file | length == 0

    - name: Resolve terraform working directory
      set_fact:
        terraform_directory: "{{ terraform_variables_file | dirname }}"

    - name: Insert or update VM entry in terraform.tfvars
      blockinfile:
        path: "{{ terraform_variables_file }}"
        insertafter: '^####start-vms-here$'
        marker: "####{mark}-{{ vm_name }}"
        marker_begin: "begin"
        marker_end: "end"
        block: |
          {{ vm_name }} = {
            template  = "/{{ dc_name }}/vm/Templates/{{ os_type }}"
            network   = "{{ network | default('Greg') }}"
            cpu       = {{ cpus | int }}
            memory_mb = {{ ram_size | int }}
            disk_gb   = {{ hd_size | int }}
            notes     = "{{ request_name }}"
          }

    # - name: Initialize Terraform
    #   command: terraform init
    #   args:
    #     chdir: "{{ terraform_directory }}"

    # - name: Plan Terraform deployment
    #   command: terraform plan -var-file="{{ terraform_variables_file }}"

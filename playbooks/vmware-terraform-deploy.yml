---
- name: Deploy VMware infrastructure using Terraform from EDA
  hosts: localhost
  gather_facts: no
  vars:
    terraform_directory: "{{ playbook_dir }}/terraform/configuration"
    terraform_variables_file: "{{ playbook_dir }}/terraform/variables.tfvars"
  tasks:
    - name: Initialize Terraform
      command: terraform init
      args:
        chdir: "{{ terraform_directory }}"

    - name: Plan Terraform deployment
      command: terraform plan -var-file="{{ terraform_variables_file }}"
      args:
        chdir: "{{ terraform_directory }}"
      register: terraform_plan

    - name: Display Terraform plan output
      debug:
        var: terraform_plan.stdout

    - name: Apply Terraform deployment
      command: terraform apply -var-file="{{ terraform_variables_file }}" -auto-approve
      args:
        chdir: "{{ terraform_directory }}"
---
- name: Deploy VMware infrastructure using Terraform from EDA
  hosts: localhost
  gather_facts: no
  vars:
    terraform_tfvars_candidates:
      - "{{ playbook_dir }}/../vmware-terraform/terraform.tfvars"
      - "{{ playbook_dir }}/terraform/variables.tfvars"
      - "{{ playbook_dir }}/terraform.tfvars"

    # test data
    catalog_item: GregSowell VMWare VM Terraform AAP
    cpus: '4'
    dc_name: MNS
    default_gateway: 10.0.50.1
    event: SERVICE_CATALOG
    hd_size: '40'
    ip_address: 10.0.50.24
    os_type: Rocky9
    ram_size: '4096'
    request_name: 551ea43087a7721064a055383cbb3585
    requester: gsowell@redhat.com
    subnet_mask: 255.255.255.0
    vm_folder: /Greg/redhat/terraform
    vm_name: NewVM1

  tasks:
    - name: Check candidate terraform variable files
      stat:
        path: "{{ item }}"
      loop: "{{ terraform_tfvars_candidates }}"
      register: terraform_tfvars_stats

    - name: Resolve terraform.tfvars path
      set_fact:
        terraform_variables_file: "{{ (terraform_tfvars_stats.results | selectattr('stat.exists', 'equalto', true) | map(attribute='item') | list | first) | default('') }}"

    - name: Fail if terraform.tfvars was not found
      fail:
        msg: "terraform.tfvars was not found. Checked: {{ terraform_tfvars_candidates | join(', ') }}"
      when: terraform_variables_file | length == 0

    - name: Resolve terraform working directory
      set_fact:
        terraform_directory: "{{ terraform_variables_file | dirname }}"

    - name: Insert or update VM entry in terraform.tfvars
      blockinfile:
        path: "{{ terraform_variables_file }}"
        insertafter: '^####start-vms-here$'
        marker: "####{mark}-{{ vm_name }}"
        marker_begin: "begin"
        marker_end: "end"
        block: |
          {{ vm_name }} = {
            template  = "/{{ dc_name }}/vm/Templates/{{ os_type }}"
            network   = "{{ network | default('Greg') }}"
            cpu       = {{ cpus | int }}
            memory_mb = {{ ram_size | int }}
            disk_gb   = {{ hd_size | int }}
            notes     = "{{ request_name }}"
          }

